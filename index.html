<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tt_agent — 短视频内容研究员</title>
<style>
  :root {
    --bg: #FAF9F6; --surface: #FFFFFF; --border: #E5E1D8;
    --ink: #1A1A1A; --ink-mid: #4A4A4A; --ink-dim: #8A8578;
    --accent: #0D7C66; --accent-bg: #E8F5F0; --warn: #C2610A; --warn-bg: #FFF4E8;
    --red: #B91C3A; --red-bg: #FFF0F0; --blue: #2563EB;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink); padding:24px 16px 80px; display:flex; flex-direction:column; align-items:center;
  }
  .container { max-width:800px; width:100%; }
  h1 { font-size:1.6rem; color:var(--ink); margin-bottom:4px; }
  .subtitle { color:var(--ink-dim); font-size:0.85rem; margin-bottom:24px; }

  /* Settings */
  .settings-bar {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:12px 16px; margin-bottom:16px; font-size:0.85rem;
  }
  .settings-bar label { color:var(--ink-mid); margin-right:8px; }
  .settings-bar select, .settings-bar input {
    border:1px solid var(--border); border-radius:4px; padding:4px 8px;
    font-size:0.85rem; margin-right:16px;
  }
  .settings-bar input[type=password] { width:240px; }

  /* Cards */
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:20px; margin-bottom:16px;
  }
  .card h3 { font-size:1rem; margin-bottom:12px; color:var(--ink); }

  /* Input */
  textarea {
    width:100%; min-height:200px; border:1px solid var(--border); border-radius:6px;
    padding:12px; font-size:0.9rem; font-family:inherit; resize:vertical;
    background:var(--bg); line-height:1.6;
  }
  textarea:focus { outline:none; border-color:var(--accent); }

  /* Buttons */
  .btn-row { display:flex; gap:8px; margin-top:12px; }
  .btn {
    padding:8px 20px; border:none; border-radius:6px; font-size:0.9rem;
    cursor:pointer; font-weight:500; transition:0.15s;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:0.9; }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-secondary { background:var(--bg); color:var(--ink); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--border); }

  /* Output */
  .output {
    background:var(--bg); border-radius:6px; padding:16px; margin-top:8px;
    white-space:pre-wrap; font-size:0.85rem; line-height:1.7; max-height:500px;
    overflow:auto; display:none;
  }
  .output.show { display:block; }

  /* Status */
  .status { font-size:0.85rem; margin-top:8px; }
  .status.info { color:var(--blue); }
  .status.success { color:var(--accent); }
  .status.error { color:var(--red); }

  /* Guardrail badges */
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.75rem; margin:2px; }
  .badge-pass { background:var(--accent-bg); color:var(--accent); }
  .badge-fail { background:var(--red-bg); color:var(--red); }
  .badge-warn { background:var(--warn-bg); color:var(--warn); }

  /* Tabs */
  .tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid var(--border); }
  .tab {
    padding:8px 16px; cursor:pointer; font-size:0.9rem; color:var(--ink-dim);
    border-bottom:2px solid transparent; margin-bottom:-2px; transition:0.15s;
  }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  hr { border:none; border-top:1px solid var(--border); margin:16px 0; }

  /* Responsive */
  @media (max-width:600px) {
    .settings-bar select, .settings-bar input { display:block; margin-bottom:8px; width:100%; }
    .btn-row { flex-direction:column; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>tt_agent</h1>
  <p class="subtitle">短视频内容研究员 — 对标拆解 + 脚本二创</p>

  <!-- Settings -->
  <div class="settings-bar">
    <label>模型服务:</label>
    <select id="provider">
      <option value="deepseek">DeepSeek (国内直达)</option>
      <option value="step">阶跃星辰 Step 3.7 Flash</option>
      <option value="custom">自定义 OpenAI 兼容</option>
    </select>
    <label>API Key:</label>
    <input type="password" id="apiKey" placeholder="输入 API Key (仅存本地浏览器)">
    <button class="btn btn-secondary" onclick="saveKey()" style="font-size:0.8rem;">保存</button>
    <span id="keyStatus" style="font-size:0.75rem;margin-left:8px;"></span>
  </div>

  <!-- Main Content -->
  <div class="card">
    <h3>📋 输入对标视频逐字稿</h3>
    <p style="color:var(--ink-dim);font-size:0.8rem;margin-bottom:8px;">
      格式: [时间] 【画面】描述 【口播】文字。也可直接粘贴纯文本口播。
    </p>
    <textarea id="transcript" placeholder="[0:00-0:03] 【画面】脏鞋特写
【口播】你看这双鞋进来的样子...
[0:03-0:08] 【画面】清洗过程
【口播】我们先用这个软化一下皮面..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnDecon" onclick="runDeconstruct()">🔍 第一步: 五层拆解</button>
      <button class="btn btn-primary" id="btnRewrite" onclick="runRewrite()" disabled>✍️ 第二步: 脚本二创</button>
      <button class="btn btn-primary" id="btnFull" onclick="runFull()">⚡ 一键全流程</button>
      <button class="btn btn-secondary" onclick="downloadResult()">💾 下载</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <!-- Output -->
  <div class="card" id="outputCard" style="display:none;">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('decon')">拆解报告</div>
      <div class="tab" onclick="switchTab('script')">二创脚本</div>
      <div class="tab" onclick="switchTab('guardrail')">合规检查</div>
    </div>
    <div id="tabDecon" class="output show"></div>
    <div id="tabScript" class="output"></div>
    <div id="tabGuardrail" class="output"></div>
  </div>
</div>

<script>
// ── State ──
let deconResult = null;
let scriptResult = null;
let guardrailResult = null;

// ── API Config ──
const PROVIDERS = {
  deepseek: {
    url: 'https://api.deepseek.com/chat/completions',
    model: 'deepseek-chat',
    headers: (key) => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` }),
  },
  step: {
    url: 'https://api.stepfun.com/v1/chat/completions',
    model: 'step-3.7-flash',
    headers: (key) => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` }),
  },
  custom: {
    url: () => prompt('输入 API endpoint URL:'),
    model: () => prompt('输入 model name:'),
    headers: (key) => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` }),
  },
};

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('tt_agent_api_key');
  const savedProv = localStorage.getItem('tt_agent_provider');
  if (saved) { document.getElementById('apiKey').value = saved; document.getElementById('keyStatus').textContent = '已加载'; }
  if (savedProv) document.getElementById('provider').value = savedProv;
});

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  const prov = document.getElementById('provider').value;
  if (key) {
    localStorage.setItem('tt_agent_api_key', key);
    localStorage.setItem('tt_agent_provider', prov);
    document.getElementById('keyStatus').textContent = '已保存 ✅';
  }
}

function getApiConfig() {
  const key = document.getElementById('apiKey').value.trim() || localStorage.getItem('tt_agent_api_key');
  const provId = document.getElementById('provider').value;
  if (!key) { alert('请先输入并保存 API Key'); return null; }
  const prov = PROVIDERS[provId];
  return {
    url: typeof prov.url === 'function' ? prov.url() : prov.url,
    model: typeof prov.model === 'function' ? prov.model() : prov.model,
    headers: prov.headers(key),
  };
}

// ── Prompts (from tt_agent templates) ──
function buildDeconstructPrompt(transcript) {
  return `你是资深短视频内容研究员。请对以下视频逐字稿做五层拆解。

${transcript}

请输出以下五个维度的分析（直接给内容，不要解释）:

## 1. 钩子类型
前3秒用了什么钩子？属于哪类（对比/反常识/身份认同/教学展示）？为什么有效？

## 2. 叙事结构
时间线分段（每段做什么），每段的信息密度（1-3分）:
- 0-3秒:
- 3-8秒:
- 8-12秒:
- 12-15秒:

## 3. 情绪曲线
- 0-25%: 什么情绪？
- 25-75%: 情绪如何变化？
- 75-100%: 结尾什么情绪？

## 4. 口播节奏
平均单句长度？停顿位置？语气变化点？

## 5. 爆款假设（最重要）
这条视频能火，核心原因是什么？给一个可证伪的假设。
这个爆点搬到鞋店/洗鞋/零售行业，应该怎么做？`;
}

function buildRewritePrompt(transcript, deconText) {
  return `你是芮玛鞋城的短视频编导。账号背景: 房山本地经营十余年的多品牌鞋城，老板娘真人出镜，店员手机拍摄。

请根据对标视频的拆解分析，为芮玛鞋城二创一条短视频脚本。

【对标视频逐字稿】
${transcript.slice(0, 500)}

【对标视频拆解分析】
${deconText.slice(0, 1000)}

【芮玛鞋城人设约束 — 必须遵守】
1. 开场第一句必须是「我们家」「我们店里」「房山这边」三选一
2. 每10句话里至少出现一次「你看」/「你看这个」（引导视线）
3. 口播单句不超过15字，超过时拆成两句
4. 🚫 拒绝书面语和专业术语堆砌
5. 🚫 拒绝「家人们」「宝子们」「绝绝子」「冲」「yyds」
6. ✅ 情绪词用北京口语: 「真不错」「可以看看」「挺值的」「还行」
7. 拍摄场景只在店内（操作台、货架、前台），拒绝棚拍感
8. 🚫 禁用: 最好、第一、100%、彻底、永久、绝对、保证
9. 🚫 不出现儿童面部、真实全名、家庭地址

【内容配比】效果展示40% + 知识科普30% + 经营故事20% + 活动10%

请输出完整的二创脚本:

## 基本信息
- 灵感来源: 对标视频
- 目标平台: 抖音
- 内容类型: (效果展示/知识科普)
- 预计时长: 15秒

## 分镜脚本
| 时间段 | 画面描述 | 口播 | 字幕 |

## 完整口播逐字稿
(把口播连起来写一遍)

## 帖子文案
(附3-5个Hashtag)`;
}

function buildGuardrailPrompt(script) {
  return `检查以下脚本是否符合合规要求，逐条报告:

${script}

检查清单:
1. 隐私: 有没有出现真实姓名、家庭地址、儿童信息？
2. 广告法: 有没有「最好」「第一」「100%」「保证」等禁用词？
3. 人设: 有没有「家人们」「宝子们」等过度网感词？有没有「我们家」「你看」等本地元素？

如果发现问题，列出具体位置和修改建议。如果没问题，说"通过"。`;
}

// ── API Call ──
async function callLLM(prompt, systemPrompt = '') {
  const config = getApiConfig();
  if (!config) throw new Error('API 配置错误');

  const messages = [];
  if (systemPrompt) messages.push({ role: 'system', content: systemPrompt });
  messages.push({ role: 'user', content: prompt });

  const resp = await fetch(config.url, {
    method: 'POST',
    headers: config.headers,
    body: JSON.stringify({
      model: config.model,
      messages: messages,
      temperature: 0.7,
      max_tokens: 4000,
    }),
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API 错误 ${resp.status}: ${err.slice(0,200)}`);
  }

  const data = await resp.json();
  return data.choices[0].message.content;
}

// ── Guardrail (local check) ──
function localGuardrail(text) {
  const issues = [];
  const adWords = ['最好','第一','100%','彻底','永久','绝对','保证','根治','唯一','最低价','底价'];
  const privacyFlags = ['儿子叫','女儿叫','我家住','手机号','身份证','几点下班','一个人看店'];
  const personaBad = ['家人们','宝子们','绝绝子','冲','yyds','给我冲'];
  const personaGood = ['我们家','我们店里','房山这边','你看','师傅'];

  for (const w of adWords) if (text.includes(w)) issues.push({type:'ad_law', msg:`广告法: 「${w}」建议替换`});
  for (const w of privacyFlags) if (text.includes(w)) issues.push({type:'privacy', msg:`隐私: 「${w}」建议模糊化`});
  for (const w of personaBad) if (text.includes(w)) issues.push({type:'persona', msg:`人设: 「${w}」过度网感, 删除`});

  const hasGood = personaGood.some(w => text.includes(w));
  if (!hasGood) issues.push({type:'persona', msg:'人设: 缺少本地/真人感元素 (我们家/你看/师傅)'});

  return issues;
}

function formatGuardrail(issues) {
  if (issues.length === 0) return '<span class="badge badge-pass">✅ 全部通过</span>';
  return issues.map(i =>
    `<span class="badge badge-${i.type==='ad_law'?'fail':i.type==='privacy'?'fail':'warn'}">${i.msg}</span>`
  ).join('<br>');
}

// ── Main Actions ──
function setStatus(msg, type='info') {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = `status ${type}`;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? '⏳ 运行中...' : btn.textContent.replace('⏳ 运行中...', '');
}

async function runDeconstruct() {
  const transcript = document.getElementById('transcript').value.trim();
  if (!transcript) { setStatus('请先粘贴逐字稿', 'error'); return; }
  setStatus('正在拆解 (约 10-20 秒)...', 'info');
  setLoading('btnDecon', true);
  try {
    const prompt = buildDeconstructPrompt(transcript);
    const result = await callLLM(prompt, '你是一个专业的短视频内容研究员，擅长拆解爆款视频的结构和传播逻辑。请用中文回复。');
    deconResult = result;
    document.getElementById('tabDecon').innerHTML = markdownToHtml(result);
    document.getElementById('outputCard').style.display = 'block';
    document.getElementById('btnRewrite').disabled = false;
    setStatus('拆解完成 ✅', 'success');
  } catch(e) {
    setStatus(`拆解失败: ${e.message}`, 'error');
  }
  setLoading('btnDecon', false);
}

async function runRewrite() {
  if (!deconResult) { setStatus('请先完成拆解', 'error'); return; }
  const transcript = document.getElementById('transcript').value.trim();
  setStatus('正在二创脚本 (约 10-20 秒)...', 'info');
  setLoading('btnRewrite', true);
  try {
    const prompt = buildRewritePrompt(transcript, deconResult);
    const result = await callLLM(prompt, '你是芮玛鞋城的签约短视频编导，擅长为本地鞋店创作实用的短视频脚本。请用中文回复。');
    scriptResult = result;
    guardrailResult = localGuardrail(result);
    document.getElementById('tabScript').innerHTML = markdownToHtml(result);
    document.getElementById('tabGuardrail').innerHTML = formatGuardrail(guardrailResult);
    document.getElementById('outputCard').style.display = 'block';
    switchTab('script');
    setStatus('二创完成 ✅', 'success');
  } catch(e) {
    setStatus(`二创失败: ${e.message}`, 'error');
  }
  setLoading('btnRewrite', false);
}

async function runFull() {
  await runDeconstruct();
  if (deconResult) await runRewrite();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.output').forEach(o => o.classList.remove('show'));
  if (tab === 'decon') { document.querySelectorAll('.tab')[0].classList.add('active'); document.getElementById('tabDecon').classList.add('show'); }
  if (tab === 'script') { document.querySelectorAll('.tab')[1].classList.add('active'); document.getElementById('tabScript').classList.add('show'); }
  if (tab === 'guardrail') { document.querySelectorAll('.tab')[2].classList.add('active'); document.getElementById('tabGuardrail').classList.add('show'); }
}

function downloadResult() {
  let text = '# tt_agent 分析报告\n\n';
  if (deconResult) text += '## 拆解报告\n\n' + deconResult + '\n\n---\n\n';
  if (scriptResult) text += '## 二创脚本\n\n' + scriptResult + '\n\n';
  if (guardrailResult) text += '## 合规检查\n\n' + guardrailResult.map(i=>`- ${i.msg}`).join('\n');
  const blob = new Blob([text], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'tt_agent_report.md'; a.click();
  URL.revokeObjectURL(url);
}

// ── Simple markdown → HTML ──
function markdownToHtml(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h4 style="margin-top:16px;color:var(--ink)">$1</h4>')
    .replace(/^## (.+)$/gm,'<h3 style="margin-top:20px;color:var(--accent)">$1</h3>')
    .replace(/^# (.+)$/gm,'<h2 style="margin-top:20px;color:var(--ink)">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li style="margin-left:20px">$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<div style="margin-left:20px">$1. $2</div>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}
</script>
</body>
</html>
